spring:
  application:
    name: credit-financing-winder

  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:credit;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: embedded
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.winder.common.mybatis
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.winder: DEBUG
    com.winder.pay.mapper: DEBUG

# 支付/资金服务配置（示例）
winder:
  pay:
    default-channel: MOCK
    retry:
      max-attempts: 3
      delay-ms: 1000
